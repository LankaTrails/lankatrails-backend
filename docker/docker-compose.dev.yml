# Docker Compose for development environment
# Use this file for local development with 'dev' profile
# Run with: docker-compose -f docker-compose.dev.yml --env-file .env.dev up

version: "3.8"

services:
  lankatrails-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ${API_CONTAINER_NAME:-lankatrails-api}
    image: ${API_IMAGE:-lankatrails/api:latest}
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      # Spring Profile
      - SPRING_PROFILES_ACTIVE=dev

      # Application Configuration
      - APP_NAME=${APP_NAME:-lankatrails-backend}
      - SERVER_PORT=8080
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}

      # Database Configuration (Docker containers)
      - DB_HOST=${DOCKER_DB_HOST:-lankatrails-postgres}
      - DB_PORT=${DOCKER_DB_PORT:-5432}
      - DB_NAME=${DOCKER_DB_NAME:-lankatrails}
      - DB_USERNAME=${DOCKER_DB_USERNAME:-postgres}
      - DB_PASSWORD=${DOCKER_DB_PASSWORD:-postgres}

      # Redis Configuration (Docker container)
      - REDIS_HOST=${DOCKER_REDIS_HOST:-lankatrails-redis}
      - REDIS_PORT=${DOCKER_REDIS_PORT:-6379}
      - REDIS_PASSWORD=${DOCKER_REDIS_PASSWORD:-redispass}
      - REDIS_SSL_ENABLED=false
      - REDIS_CACHE_KEY_PREFIX=${REDIS_CACHE_KEY_PREFIX:-lankatrails:}
      - REDIS_CACHE_TTL=${REDIS_CACHE_TTL:-3600}
      - CACHE_TYPE=redis

      # MongoDB Configuration (Docker container)
      - MONGODB_URI=${DOCKER_MONGODB_URI:-mongodb://lankatrails-mongodb:27017/lankatrails}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-lankatrails}

      # RabbitMQ Configuration (Docker container)
      - RABBITMQ_HOST=${DOCKER_RABBITMQ_HOST:-lankatrails-rabbitmq}
      - RABBITMQ_PORT=${DOCKER_RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${DOCKER_RABBITMQ_USERNAME:-admin}
      - RABBITMQ_PASSWORD=${DOCKER_RABBITMQ_PASSWORD:-admin123}
      - RABBITMQ_VIRTUAL_HOST=/
      - RABBITMQ_STOMP_PORT=61613
      - RABBITMQ_ACK_MODE=auto
      - RABBITMQ_PREFETCH=10

      # Security Configuration
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-3600000}
      - EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS=${EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS:-900000}
      - JWT_COOKIE_NAME=${JWT_COOKIE_NAME:-lankatrails_jwt}
      - REFRESH_TOKEN_COOKIE_NAME=${REFRESH_TOKEN_COOKIE_NAME:-lankatrails_refresh_token}

      # Mail Configuration
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_SMTP_AUTH=true
      - MAIL_SMTP_STARTTLS=true

      # File Upload Configuration
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10MB}
      - MAX_REQUEST_SIZE=${MAX_REQUEST_SIZE:-10MB}
      - FILE_UPLOAD_ROOT_PATH=${FILE_UPLOAD_ROOT_PATH:-/app/uploads}

      # WebSocket Configuration
      - WEBSOCKET_MESSAGE_SIZE_LIMIT=${WEBSOCKET_MESSAGE_SIZE_LIMIT:-2MB}
      - WEBSOCKET_BUFFER_SIZE_LIMIT=${WEBSOCKET_BUFFER_SIZE_LIMIT:-4MB}

      # External Services
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    depends_on:
      lankatrails-postgres:
        condition: service_healthy
      lankatrails-redis:
        condition: service_healthy
      lankatrails-mongodb:
        condition: service_started
      lankatrails-rabbitmq:
        condition: service_healthy
    volumes:
      # Mount source code for hot reload (if needed)
      - ../src:/app/src:ro
      # Mount application logs
      - lankatrails_app_logs:/app/logs
      # Mount uploads directory
      - lankatrails_uploads:/app/uploads
    networks:
      - lankatrails-network
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:${SERVER_PORT:-8080}${MANAGEMENT_BASE_PATH:-/actuator}/health",
        ]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-60s}

  lankatrails-postgres:
    image: ${POSTGRES_IMAGE:-postgis/postgis:15-3.3-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-lankatrails-postgres}
    environment:
      - POSTGRES_DB=${DOCKER_DB_NAME:-lankatrails}
      - POSTGRES_USER=${DOCKER_DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DOCKER_DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - lankatrails_postgres_data:/var/lib/postgresql/data
      - ./init-scripts/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./init-scripts/02-postgis.sql:/docker-entrypoint-initdb.d/02-postgis.sql
    networks:
      - lankatrails-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 30s
      timeout: 10s
      retries: 3

  lankatrails-redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-lankatrails-redis}
    command: redis-server --requirepass ${DOCKER_REDIS_PASSWORD:-redispass}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - lankatrails_redis_data:/data
    networks:
      - lankatrails-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "redispass", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  lankatrails-mongodb:
    image: ${MONGODB_IMAGE:-mongo:6-jammy}
    container_name: ${MONGODB_CONTAINER_NAME:-lankatrails-mongodb}
    environment:
      - MONGO_INITDB_DATABASE=${MONGODB_DATABASE:-lankatrails}
    ports:
      - "27018:27017"
    volumes:
      - lankatrails_mongodb_data:/data/db
    networks:
      - lankatrails-network

  lankatrails-rabbitmq:
    image: ${RABBITMQ_IMAGE:-rabbitmq:3.12-management-alpine}
    container_name: ${RABBITMQ_CONTAINER_NAME:-lankatrails-rabbitmq}
    environment:
      - RABBITMQ_DEFAULT_USER=${DOCKER_RABBITMQ_USERNAME:-admin}
      - RABBITMQ_DEFAULT_PASS=${DOCKER_RABBITMQ_PASSWORD:-admin123}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
      - "${RABBITMQ_STOMP_EXTERNAL_PORT:-61613}:61613"
    volumes:
      - lankatrails_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - lankatrails-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp rabbitmq_web_stomp &&
             rabbitmq-server"

volumes:
  lankatrails_postgres_data:
  lankatrails_redis_data:
  lankatrails_mongodb_data:
  lankatrails_rabbitmq_data:
  lankatrails_app_logs:
  lankatrails_uploads:

networks:
  lankatrails-network:
    driver: bridge

# Docker Compose for production environment
# Use this file for production deployments with 'prod' profile
# Run with: docker-compose -f docker-compose.prod.yml --env-file .env.prod up

version: "3.8"

services:
  lankatrails-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ${API_CONTAINER_NAME:-lankatrails-api}
    image: ${API_IMAGE:-lankatrails/api:latest}
    ports:
      - "${API_PORT:-80}:8080"
    environment:
      # Spring Profile
      - SPRING_PROFILES_ACTIVE=prod

      # Application Configuration
      - APP_NAME=${APP_NAME:-lankatrails-backend}
      - SERVER_PORT=8080
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}

      # Database Configuration (Docker containers)
      - DB_HOST=${DOCKER_DB_HOST:-lankatrails-postgres}
      - DB_PORT=${DOCKER_DB_PORT:-5432}
      - DB_NAME=${DOCKER_DB_NAME:-lankatrails}
      - DB_USERNAME=${DOCKER_DB_USERNAME:-postgres}
      - DB_PASSWORD=${DOCKER_DB_PASSWORD}

      # Redis Configuration (Docker container)
      - REDIS_HOST=${DOCKER_REDIS_HOST:-lankatrails-redis}
      - REDIS_PORT=${DOCKER_REDIS_PORT:-6379}
      - REDIS_PASSWORD=${DOCKER_REDIS_PASSWORD}
      - REDIS_SSL_ENABLED=${REDIS_SSL_ENABLED:-false}
      - REDIS_CACHE_KEY_PREFIX=${REDIS_CACHE_KEY_PREFIX:-lankatrails:}
      - REDIS_CACHE_TTL=${REDIS_CACHE_TTL:-3600}
      - CACHE_TYPE=redis

      # MongoDB Configuration (Docker container)
      - MONGODB_URI=${DOCKER_MONGODB_URI:-mongodb://lankatrails-mongodb:27017/lankatrails}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-lankatrails}

      # RabbitMQ Configuration (Docker container)
      - RABBITMQ_HOST=${DOCKER_RABBITMQ_HOST:-lankatrails-rabbitmq}
      - RABBITMQ_PORT=${DOCKER_RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${DOCKER_RABBITMQ_USERNAME:-admin}
      - RABBITMQ_PASSWORD=${DOCKER_RABBITMQ_PASSWORD}
      - RABBITMQ_VIRTUAL_HOST=/
      - RABBITMQ_STOMP_PORT=61613
      - RABBITMQ_ACK_MODE=auto
      - RABBITMQ_PREFETCH=10

      # Security Configuration
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-3600000}
      - EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS=${EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS:-900000}
      - JWT_COOKIE_NAME=${JWT_COOKIE_NAME:-lankatrails_jwt}
      - REFRESH_TOKEN_COOKIE_NAME=${REFRESH_TOKEN_COOKIE_NAME:-lankatrails_refresh_token}

      # Mail Configuration
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_SMTP_AUTH=true
      - MAIL_SMTP_STARTTLS=true

      # File Upload Configuration
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10MB}
      - MAX_REQUEST_SIZE=${MAX_REQUEST_SIZE:-10MB}
      - FILE_UPLOAD_ROOT_PATH=${FILE_UPLOAD_ROOT_PATH:-/app/uploads}

      # WebSocket Configuration
      - WEBSOCKET_MESSAGE_SIZE_LIMIT=${WEBSOCKET_MESSAGE_SIZE_LIMIT:-2MB}
      - WEBSOCKET_BUFFER_SIZE_LIMIT=${WEBSOCKET_BUFFER_SIZE_LIMIT:-4MB}

      # External Services
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}

      # Logging Configuration (production optimized)
      - LOG_LEVEL_ROOT=${LOG_LEVEL_ROOT:-WARN}
      - LOG_LEVEL_SPRING=${LOG_LEVEL_SPRING:-INFO}
      - LOG_LEVEL_HIBERNATE_SQL=${LOG_LEVEL_HIBERNATE_SQL:-WARN}
      - LOG_LEVEL_HIBERNATE_BINDER=${LOG_LEVEL_HIBERNATE_BINDER:-WARN}
      - LOG_LEVEL_SPRING_SECURITY=${LOG_LEVEL_SPRING_SECURITY:-INFO}
      - LOG_LEVEL_LANKATRAILS=${LOG_LEVEL_LANKATRAILS:-INFO}

      # Management/Actuator Configuration (production secure)
      - MANAGEMENT_ENDPOINTS_EXPOSURE=${MANAGEMENT_ENDPOINTS_EXPOSURE:-health,info,metrics}
      - MANAGEMENT_HEALTH_SHOW_DETAILS=${MANAGEMENT_HEALTH_SHOW_DETAILS:-when-authorized}
      - MANAGEMENT_ENV_ENABLED=${MANAGEMENT_ENV_ENABLED:-false}
      - MANAGEMENT_BEANS_ENABLED=${MANAGEMENT_BEANS_ENABLED:-false}
      - MANAGEMENT_BASE_PATH=/actuator
      - MANAGEMENT_SECURITY_ENABLED=${MANAGEMENT_SECURITY_ENABLED:-true}
    depends_on:
      lankatrails-postgres:
        condition: service_healthy
      lankatrails-redis:
        condition: service_healthy
      lankatrails-mongodb:
        condition: service_started
      lankatrails-rabbitmq:
        condition: service_healthy
    volumes:
      - lankatrails_app_logs:/app/logs
      # Mount uploads directory for persistent file storage
      - uploads_data_prod:/app/uploads
    networks:
      - lankatrails-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:${SERVER_PORT:-8080}${MANAGEMENT_BASE_PATH:-/actuator}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  lankatrails-postgres:
    image: ${POSTGRES_IMAGE:-postgis/postgis:15-3.3-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-lankatrails-postgres}
    environment:
      - POSTGRES_DB=${DOCKER_DB_NAME:-lankatrails}
      - POSTGRES_USER=${DOCKER_DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DOCKER_DB_PASSWORD}
    # Don't expose ports in production (internal access only)
    # ports: []
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./init-scripts/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./init-scripts/02-postgis.sql:/docker-entrypoint-initdb.d/02-postgis.sql
    networks:
      - lankatrails-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  lankatrails-redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-lankatrails-redis}
    command: redis-server --requirepass ${DOCKER_REDIS_PASSWORD}
    # Don't expose ports in production (internal access only)
    # ports: []
    volumes:
      - redis_data_prod:/data
    networks:
      - lankatrails-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${DOCKER_REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  lankatrails-mongodb:
    image: ${MONGODB_IMAGE:-mongo:6-jammy}
    container_name: ${MONGODB_CONTAINER_NAME:-lankatrails-mongodb}
    environment:
      - MONGO_INITDB_DATABASE=${MONGODB_DATABASE:-lankatrails}
    # Don't expose ports in production (internal access only)
    # ports: []
    volumes:
      - mongodb_data_prod:/data/db
    networks:
      - lankatrails-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  lankatrails-rabbitmq:
    image: ${RABBITMQ_IMAGE:-rabbitmq:3.12-management-alpine}
    container_name: ${RABBITMQ_CONTAINER_NAME:-lankatrails-rabbitmq}
    environment:
      - RABBITMQ_DEFAULT_USER=${DOCKER_RABBITMQ_USERNAME:-admin}
      - RABBITMQ_DEFAULT_PASS=${DOCKER_RABBITMQ_PASSWORD}
    # Only expose AMQP and STOMP ports in production (no management UI)
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_STOMP_EXTERNAL_PORT:-61613}:61613"
    volumes:
      - rabbitmq_data_prod:/var/lib/rabbitmq
    networks:
      - lankatrails-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp rabbitmq_web_stomp &&
             rabbitmq-server"

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  mongodb_data_prod:
    driver: local
  rabbitmq_data_prod:
    driver: local
  uploads_data_prod:
    driver: local
  lankatrails_app_logs:

networks:
  lankatrails-network:
    driver: bridge

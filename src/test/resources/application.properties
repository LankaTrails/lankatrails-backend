# Test Profile Configuration
spring.profiles.active=test

# Allow bean definition overriding for testing
spring.main.allow-bean-definition-overriding=true

# Application Configuration
spring.application.name=lankatrails-backend
server.port=0

# Test Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA/Hibernate Configuration for Testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# External Services Configuration (for testing)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.mongodb.uri=mongodb://localhost:27017/test
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
spring.rabbitmq.stomp-port=61613

# Mail Configuration for Testing
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@example.com
spring.mail.password=test_password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.from=test@example.com

# Stripe Configuration for Testing
stripe.secret-key=sk_test_test_secret_key_for_testing
stripe.webhook-secret=whsec_test_webhook_secret_for_testing

# CORS Configuration for Testing
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# JWT Configuration for Testing
spring.app.jwtSecret=testSecretKeyForJunitTestingThatIsLongEnoughToMeetSecurityRequirements
spring.app.jwtExpirationMs=3600000
spring.app.emailVerificationTokenExpirationMs=900000
spring.app.jwtCookieName=test_jwt
spring.app.refreshTokenCookieName=test_refresh_token

# File Upload Configuration for Testing
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebSocket Configuration for Testing
spring.websocket.message-size-limit=2MB
spring.websocket.buffer-size-limit=4MB

# Management/Actuator Configuration for Testing
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Cache Configuration for Testing
spring.cache.type=none
spring.cache.redis.time-to-live=3600

# Logging Configuration for Testing
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.lankatrails=DEBUG

# Disable auto-configurations for testing
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
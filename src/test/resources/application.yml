# Test configuration now uses 'test' profile automatically
# The 'test' profile is defined in application-test.yml in main/resources
# This file contains only test-specific overrides

spring:
  profiles:
    active: test
  
  main:
    allow-bean-definition-overriding: true
  
  # Override for random port in tests
  server:
    port: 0
  
  # Disable external services for testing
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Test-specific overrides
app:
  jwtSecret: testSecretKeyForJunitTestingThatIsLongEnoughToMeetSecurityRequirements
  jwtCookieName: test_jwt
  refreshTokenCookieName: test_refresh_token

stripe:
  secret-key: sk_test_test_secret_key_for_testing
  webhook-secret: whsec_test_webhook_secret_for_testing
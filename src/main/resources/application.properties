# Application Configuration
spring.application.name=lankatrails-backend
server.port=8080

# Server Configuration
app.cors.allowed-origins=http://localhost:19006,http://localhost:8081,http://localhost:8082,http://localhost:5500,http://192.168.x.x:19006,https://admin.lankatrails.com,https://provider.lankatrails.com,exp://192.168.x.x:19000,https://0e3bf1d67e4f.ngrok-free.app

# Database Configuration (H2 for development)
#spring.datasource.url=jdbc:h2:mem:lankatrails_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console
#spring.h2.console.settings.web-allow-others=true

# Database Configuration (PostgreSQL for production)
spring.datasource.url=jdbc:postgresql://localhost:5432/lankatrails
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.spatial.dialect.postgis.PostgisDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# JWT Configuration
spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=3600000
spring.app.emailVerificationTokenExpirationMs=900000
spring.app.jwtCookieName=lankatrails_jwt
spring.app.refreshTokenCookieName=lankatrails_refresh_token

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.com.lankatrails=DEBUG
#logging.level.org.hibernate.stat=DEBUG  # Remove comment if needed

# Development Features
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# HTTP Tracing (for API debugging)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.enabled=true
management.endpoint.beans.enabled=true

# Redis Config
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=false
#spring.cache.redis.key-prefix=lankatrails:
spring.cache.redis.time-to-live=3600
spring.cache.type=redis

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Gmail SMTP server settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_FROM}

# RabbitMQ connection
spring.rabbitmq.host=localhost
#spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=/
spring.rabbitmq.stomp-port=61613

# Security
#allowed.websocket.origins=https://*.lankatrails.com,https://lankatrails.com

# Optional: connection tuning
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.prefetch=10

# WebSocket message size limits (if you send attachments or big payloads)
spring.websocket.message-size-limit=2MB
spring.websocket.buffer-size-limit=4MB

# MongoDB Configuration
#spring.data.mongodb.uri=mongodb://localhost:27017/lankatrails
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=lankatrails

# Stripe Configuration
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
